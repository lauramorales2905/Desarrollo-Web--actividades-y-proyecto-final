<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Consulta PokeAPI</title>

    <style>
        body{
            background: linear-gradient(to right, #f8f9fa, #dbeafe);
            min-height: 100vh;
        }

        h1{
            text-align: center;
            color: #0d6efd;
            font-weight: bold;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        h1:hover{
            color: #dc3545;
            transform: scale(1.05);
        }

        #pokemons{
            justify-content: center;
        }

        .pokemon-card{
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .pokemon-card:hover{
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .contenedor{
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body class="container mt-4">

    <div class="contenedor">

        <h1>⚡ Consulta de Pokémon con Fetch API ⚡</h1>

        <p class="text-center text-muted mb-4">
            Ejemplo de consumo de datos desde la PokeAPI utilizando JavaScript y Fetch API.
        </p>

        <div id="pokemons" class="d-flex flex-wrap gap-3">
            <!-- Aquí aparecerán los Pokémon desde JavaScript -->
        </div>

    </div>

    <script src="js/script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
